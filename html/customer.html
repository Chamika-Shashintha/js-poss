    <div class="container mt-4">

            <div class="col-12 col-sm-6 col-md-3">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" class="form-control" placeholder="ex: nimal">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                  <div class="form-group">
                    <label for="name">Address</label>
                    <input type="text" id="address" class="form-control" placeholder="ex: colombo" >
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                  <div class="form-group">
                    <label for="name">Salary</label>
                    <input type="number" id="salary" class="form-control" placeholder="ex: LKR  100000">
                </div>
            </div>

            <div class="col-12">
                <br>
                  <div class="form-group">
                    <input type="button" id="btn-create" class="btn btn-primary col-5"  value="create custom" 
                    onclick="createCustomer()">
                    <input type="button" id="btn-update" class="btn btn-success col-5"  value="Update custom"
                    onclick="UpdateRecode()">    
                </div>
            </div>
        </div><hr>

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>#ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Salary</th>
                    <th>Option</th>

                </tr>
            </thead>
