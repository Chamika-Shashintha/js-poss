<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Dashboard</title>
</head>
<body>
    
    <div class="container">
        <div class="row">
            <div class="col-12 col-sm-6 col-md-3">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" class="form-control" placeholder="ex: nimal">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                  <div class="form-group">
                    <label for="name">Address</label>
                    <input type="text" id="address" class="form-control" placeholder="ex: colombo" >
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                  <div class="form-group">
                    <label for="name">Salary</label>
                    <input type="number" id="salary" class="form-control" >
                </div>
            </div>

            <div class="col-12">
                <br>
                  <div class="form-group">
                    <input type="button" id="btn-create" class="btn btn-primary"  value="create custom" 
                    onclick="createCustomer()">
                </div>
            </div>

        </div>

    </div>


    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="/js/firebaseCnfig.js"></script>  
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="../js/dashboard.js"></script>   
</body>
</html>
